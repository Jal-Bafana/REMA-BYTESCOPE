<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" />
  <title>Secure Sign-In | ByteScope Journal</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="page-login">
  <main class="auth-layout">
    <section class="card auth-card">
      <p class="badge attack">Member Access</p>
      <h1>Sign in to Access API Credits</h1>
      <p class="muted">Sign in to continue and unlock account benefits.</p>

      <form id="loginForm" novalidate>
        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="you@example.com" required />

        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="••••••••" required minlength="8" />

        <p id="loginError" class="error-text" aria-live="polite"></p>

        <button class="btn attack-btn" type="submit">Continue</button>
      </form>

      <a class="link-back" href="index.html">Back to blog</a>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
